---
name: "GA Manager"
version: "0.5.0"
slug: "ga_manager"
description: "GreenAutarky on-device management engine — health, versions, lifecycle, OTA"
url: https://github.com/greenautarky/ga_manager
codenotary: notary@greenautarky.com
image: ghcr.io/greenautarky/ga_manager-{arch}
init: false
startup: services
homeassistant: "2024.12.0"
arch:
  - aarch64
  - amd64
  - armv7
full_access: true
hassio_api: true
hassio_role: admin
homeassistant_api: true
docker_api: true
auth_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:shield-cog
panel_admin: true
panel_title: "GA Manager"
priviledged:
  - SYS_ADMIN
apparmor: false
journald: true
host_network: false
services:
  - mqtt:need
ports:
  "8099/tcp": null
ports_description:
  "8099/tcp": "GA Manager REST API (Phase 1: Ingress only; Phase 5: NetBird-exposed via Caddy)"
map:
  - type: share
    read_only: false
  - type: ssl
  - type: homeassistant_config
    read_only: false
  - type: all_addon_configs
    read_only: false
  - type: data
    read_only: false
    path: /data/
options:
  log_level: info
  health_check:
    interval: 60
    write_status_file: true
    status_file_path: "/share/ga_manager/status.json"
    publish_mqtt: false
    thresholds:
      data_disk_warn: 80
      data_disk_crit: 90
      ram_warn: 85
      ram_crit: 95
      load5_warn: 4.0
      load5_crit: 8.0
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  health_check:
    interval: int(10,3600)
    write_status_file: bool
    status_file_path: str
    publish_mqtt: bool
    thresholds:
      data_disk_warn: int(0,100)
      data_disk_crit: int(0,100)
      ram_warn: int(0,100)
      ram_crit: int(0,100)
      load5_warn: float(0.0,99.0)
      load5_crit: float(0.0,99.0)
