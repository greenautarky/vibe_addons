---
version: "7.1.1"
slug: ga_mosquitto
name: ga_Mosquitto broker
description: An Open Source MQTT broker
url: https://github.com/home-assistant/addons/tree/master/mosquitto
codenotary: notary@home-assistant.io
arch:
  - armv7
  - aarch64
  - amd64
auth_api: true
discovery:
  - mqtt
image: ghcr.io/greenautarky/ga_mosquitto-{arch}
map:
  - ssl
  - share
options:
  logins: 
    - username: ga_zigbee2mqtt
      password: ga_zigbee2mqtt
    - username: ga_telegraf
      password: ga_telegraf
  log_dest: []
  log_type: []
  require_certificate: false
  certfile: fullchain.pem
  keyfile: privkey.pem
  customize:
    active: false
    folder: mosquitto
ports:
  1883/tcp: 1883
  1884/tcp: 1884
  8883/tcp: 8883
  8884/tcp: 8884
schema:
  logins:
    - username: str
      password: password
      password_pre_hashed: "bool?"
  log_dest:
    - list(none|stdout|stderr|topic)?
  log_type:
    - list(none|debug|error|warning|notice|information|subscribe|unsubscribe|websockets|all)?
  require_certificate: bool
  certfile: str
  cafile: str?
  keyfile: str
  customize:
    active: bool
    folder: str
  debug: bool?
services:
  - mqtt:provide
startup: system
watchdog: tcp://[HOST]:1883
init: false
